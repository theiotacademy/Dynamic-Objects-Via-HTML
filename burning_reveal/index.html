<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Burning reveal</title>
  <link rel="stylesheet" href="./style.css">

</head>

<body>

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic</title>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  </head>

  <body>
    <div class="hero-section">
      <div class="hero-content">
        <h1 class="hero-title">The IoT Academy</h1>
        <p class="hero-subtitle">Connecting The Unconnected</p>
      </div>
    </div>

    <canvas id="fire-overlay"></canvas>

    <script type="x-shader/x-vertex" id="vertShader">
    precision mediump float;

        varying vec2 vUv;
        attribute vec2 a_position;

        void main() {
            vUv = a_position;
            gl_Position = vec4(a_position, 0.0, 1.0);
        }
    </script>

    <script type="x-shader/x-fragment" id="fragShader">
    precision mediump float;

        varying vec2 vUv;
        uniform vec2 u_resolution;
        uniform float u_progress;
        uniform float u_time;
        uniform sampler2D u_text;

        float rand(vec2 n) {
            return fract(cos(dot(n, vec2(12.9898, 4.1414))) * 43758.5453);
        }

        float noise(vec2 n) {
            const vec2 d = vec2(0., 1.);
            vec2 b = floor(n), f = smoothstep(vec2(0.0), vec2(1.0), fract(n));
            return mix(mix(rand(b), rand(b + d.yx), f.x), mix(rand(b + d.xy), rand(b + d.yy), f.x), f.y);
        }

        float fbm(vec2 n) {
            float total = 0.0, amplitude = .4;
            for (int i = 0; i < 6; i++) {
                total += noise(n) * amplitude;
                n += n;
                amplitude *= 0.52;
            }
            return total;
        }

        void main() {
            vec2 uv = vUv;
            uv.x *= min(1., u_resolution.x / u_resolution.y);
            uv.y *= min(1., u_resolution.y / u_resolution.x);

            vec2 screenUv = vUv * 0.5 + 0.5;
            screenUv.y = 1.0 - screenUv.y;

            float t = u_progress;
            float slowTime = u_time * 0.0018;

            vec4 textColor = texture2D(u_text, screenUv);
            vec3 color = textColor.rgb;

            float main_noise = 1. - fbm(.75 * uv + 10. - vec2(.3, .9 * t));

            // Wide scorch: paper yellows then browns gradually
            float scorch = smoothstep(main_noise - .22, main_noise - .02, t);
            float scorch2 = smoothstep(main_noise - .10, main_noise - .01, t);
            color = mix(color, vec3(.72, .52, .18), scorch * .55);   // yellow-brown
            color = mix(color, vec3(.18, .10, .05), scorch2 * .80);  // dark char

            // Erase burned paper
            float paper_darkness = smoothstep(main_noise - .008, main_noise, t);
            color -= vec3(.99, .95, .99) * paper_darkness;

            // Single realistic fire: dim orange-red, no blown-out white
            float fire_n = fbm(5. * uv - vec2(0., slowTime * 1.8));
            float fire_var = fbm(9. * uv - vec2(0., slowTime * 2.4) + vec2(3.1, 0.));

            // Real fire palette: dark red -> orange -> pale yellow tip
            vec3 fire_color = mix(
                vec3(.55, .08, .01),   // deep red base
                vec3(.90, .38, .04),   // orange mid
                clamp(fire_n * 1.4, 0., 1.)
            );
            fire_color = mix(fire_color, vec3(.98, .80, .30), clamp(fire_var * .6, 0., 1.));

            // Thin, irregular glowing rim — the actual burn line
            float fire_border = .012 + .018 * fire_n;
            float fire_edge = smoothstep(main_noise - fire_border, main_noise - fire_border * .4, t);
            fire_edge *= (1. - smoothstep(main_noise - fire_border * .4, main_noise + .001, t));
            fire_edge *= (0.5 + 0.5 * fire_var); // break up uniformity

            color += fire_color * fire_edge * 1.2;

            float opacity = 1. - smoothstep(main_noise - .0005, main_noise, t);

            gl_FragColor = vec4(color, opacity);
        }
    </script>
  </body>
  <script src="./script.js"></script>

</body>

</html>
